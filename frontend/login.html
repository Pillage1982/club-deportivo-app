<!DOCTYPE html>
<html>

<head>

  <title>Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container mt-5">

  <h2>Login</h2>

  <div class="mb-3">
    <input
      type="text"
      id="usuario"
      class="form-control"
      placeholder="Usuario">
  </div>

  <div class="mb-3">
    <input
      type="password"
      id="password"
      class="form-control"
      placeholder="Contraseña">
  </div>

  <button
    onclick="login()"
    class="btn btn-primary">
    Ingresar
  </button>

  <p id="respuesta" class="mt-3"></p>

</div>

<script src="js/login.js"></script>

</body>
</html>
